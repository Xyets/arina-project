<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>OBS Alert</title>

  <style>
    body {
      margin: 0;
      background: transparent;
      overflow: hidden;
      text-align: center;
    }

    .vibration-gif {
      width: 200px;
      height: auto;
      display: inline;
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      25% { transform: scale(1.25); }
      50% { transform: scale(0.9); }
      75% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <!-- 🔥 GIF выбирается автоматически -->
  <img id="gif" class="vibration-gif" />

  <script>
    /* ---------------------------------------------------------
       🔧 1. Профиль OBS (передаётся сервером)
    --------------------------------------------------------- */
    const PROFILE_KEY = "{{ profile_key }}";

    /* ---------------------------------------------------------
       🎨 2. Выбор GIF по профилю
    --------------------------------------------------------- */
    const gif = document.getElementById("gif");

    if (PROFILE_KEY.startsWith("arina")) {
        gif.src = "{{ url_for('static', filename='arina.png') }}";
    } else {
        gif.src = "{{ url_for('static', filename='irina.png') }}";
    }

    /* ---------------------------------------------------------
       🔥 3. Очередь вибраций
    --------------------------------------------------------- */
    let vibrationQueue = [];
    let isPlaying = false;

    function playNext() {
      if (isPlaying || vibrationQueue.length === 0) return;

      const { strength, duration } = vibrationQueue.shift();
      isPlaying = true;

      let s = Math.max(1, Math.min(Number(strength) || 1, 20));

      let speed = Math.max(0.25, 1.5 - s * 0.06);
      const scale = 1 + s / 8;
      const glowSize = s * 4;
      const glowOpacity = 0.5 + s / 20;

      gif.style.animation = `pulse ${speed}s ease-in-out infinite`;
      gif.style.transform = `scale(${scale})`;
      gif.style.filter = `drop-shadow(0 0 ${glowSize}px rgba(30,144,255,${glowOpacity}))`;

      setTimeout(() => {
        gif.style.animation = "";
        gif.style.transform = "scale(1)";
        gif.style.filter = "drop-shadow(0 0 8px rgba(30,144,255,0.4))";

        isPlaying = false;
        playNext();
      }, duration * 1000);
    }

    function enqueueVibration(strength, duration) {
      vibrationQueue.push({ strength, duration });
      playNext();
    }

    /* ---------------------------------------------------------
       🌐 4. WebSocket с авто‑реконнектом
    --------------------------------------------------------- */
    let socket = null;

    function connectWS() {
      socket = new WebSocket("wss://arinairina.duckdns.org/ws/");

      socket.onopen = () => {
        console.log("✅ WebSocket подключён");

        socket.send(JSON.stringify({
          type: "hello",
          role: "obs",
          profile_key: PROFILE_KEY
        }));

        if (socket._pingInterval) clearInterval(socket._pingInterval);
        socket._pingInterval = setInterval(() => {
          if (socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({ type: "ping" }));
          }
        }, 30000);
      };

      socket.onclose = () => {
        console.log("❌ WebSocket закрыт, переподключение...");
        if (socket._pingInterval) clearInterval(socket._pingInterval);
        setTimeout(connectWS, 2000);
      };

      socket.onmessage = (event) => {
        let data;
        try {
          data = JSON.parse(event.data);
        } catch {
          console.warn("⚠️ Некорректный JSON:", event.data);
          return;
        }

        console.log("📡 Получено сообщение:", data);

        /* ---------------------------------------------------------
           🛑 STOP
        --------------------------------------------------------- */
        if (data.stop && data.target === PROFILE_KEY) {
          vibrationQueue = [];
          isPlaying = false;

          gif.style.animation = "";
          gif.style.transform = "scale(1)";
          gif.style.filter = "drop-shadow(0 0 8px rgba(30,144,255,0.4))";
          return;
        }

        /* ---------------------------------------------------------
           💥 Вибрация
        --------------------------------------------------------- */
        if (data.vibration && data.vibration.target === PROFILE_KEY) {
          enqueueVibration(data.vibration.strength, data.vibration.duration);
          return;
        }

        /* ---------------------------------------------------------
           🎭 Реакции OBS
        --------------------------------------------------------- */
        if (data.reaction && data.profile === PROFILE_KEY) {
          console.log("🎭 Реакция:", data);
          return;
        }
      };
    }

    connectWS();
  </script>

</body>
</html>
