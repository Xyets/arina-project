<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Arina Heart Bottle Goal</title>

<style>
    body {
        margin: 0;
        background: transparent;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    #wrapper {
        position: absolute;
        bottom: 20px;
        left: 20px;
        display: flex;
        align-items: center;
        gap: 20px;
    }

    /* Контейнер SVG */
    #heartContainer {
        width: 220px;
        height: 260px;
        position: relative;
    }

    /* Пульсация */
    @keyframes pulseGlow {
        0%   { transform: scale(1); filter: drop-shadow(0 0 10px #ff7abf); }
        50%  { transform: scale(1.12); filter: drop-shadow(0 0 25px #ff4fa3); }
        100% { transform: scale(1); filter: drop-shadow(0 0 10px #ff7abf); }
    }

    /* Вибрация */
    @keyframes shake {
        0% { transform: translate(0,0); }
        25% { transform: translate(-3px,2px); }
        50% { transform: translate(3px,-2px); }
        75% { transform: translate(-2px,3px); }
        100% { transform: translate(0,0); }
    }

    .glow {
        animation: pulseGlow 1s infinite ease-in-out;
    }

    .shake {
        animation: shake 0.12s infinite;
    }

    /* Плавающие сердечки */
    .floatHeart {
        position: absolute;
        font-size: 18px;
        color: #ff7abf;
        opacity: 0.9;
        animation: floatUp 2.2s ease-out forwards;
        pointer-events: none;
        text-shadow: 0 0 6px #ff4fa3;
    }

    @keyframes floatUp {
        0%   { transform: translateY(0) scale(1); opacity: 1; }
        100% { transform: translateY(-120px) scale(1.6); opacity: 0; }
    }

    /* Конфетти */
    .confetti {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 2px;
        animation: confettiFall 1.2s ease-out forwards;
        pointer-events: none;
    }

    @keyframes confettiFall {
        0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
        100% { transform: translateY(-200px) rotate(360deg); opacity: 0; }
    }

    #goalName {
        writing-mode: vertical-rl;
        text-orientation: upright;
        font-size: 32px;
        color: #ffe3f2;
        font-weight: bold;
        letter-spacing: 4px;
        text-shadow:
            -2px -2px 3px #ff4fa3,
             2px -2px 3px #ff4fa3,
            -2px  2px 3px #ff4fa3,
             2px  2px 3px #ff4fa3,
             0px  0px 8px #ff8ac9;
    }
</style>
</head>

<body>

<div id="wrapper">
    <div id="heartContainer">
        <!-- SVG бутылочка-сердце -->
        <svg id="heartSVG" viewBox="0 0 200 240">

            <!-- Пробка-сердечко -->
            <path d="M100 10
                     C90 0, 60 0, 60 25
                     C60 45, 100 70, 100 70
                     C100 70, 140 45, 140 25
                     C140 0, 110 0, 100 10Z"
                  fill="#ff7abf"
                  stroke="#ff4fa3"
                  stroke-width="3"
                  filter="drop-shadow(0 0 6px #ff7abf)">
            </path>

            <!-- Контур бутылочки -->
            <path id="bottleOutline"
                  d="M100 70
                     C40 70, 20 120, 20 160
                     C20 210, 60 230, 100 230
                     C140 230, 180 210, 180 160
                     C180 120, 160 70, 100 70Z"
                  fill="none"
                  stroke="#ff7abf"
                  stroke-width="5"
                  filter="drop-shadow(0 0 10px #ff7abf)">
            </path>

            <!-- Маска для жидкости -->
            <clipPath id="heartClip">
                <path d="M100 70
                         C40 70, 20 120, 20 160
                         C20 210, 60 230, 100 230
                         C140 230, 180 210, 180 160
                         C180 120, 160 70, 100 70Z"></path>
            </clipPath>

            <!-- Жидкость -->
            <rect id="liquid"
                  x="20" y="230"
                  width="160" height="0"
                  clip-path="url(#heartClip)"
                  fill="url(#liquidGradient)">
            </rect>

            <defs>
                <linearGradient id="liquidGradient" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#ffb3e6"/>
                    <stop offset="100%" stop-color="#a8ffd4"/>
                </linearGradient>
            </defs>
        </svg>
    </div>

    <div id="goalName"></div>
</div>

<script>
const PROFILE_KEY = "{{ profile_key }}";
const ws = new WebSocket("wss://arinairina.duckdns.org/ws/");

ws.onopen = () => {
    ws.send(JSON.stringify({
        type: "hello",
        role: "obs",
        profile_key: PROFILE_KEY
    }));
};

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.goal_update && data.profile === PROFILE_KEY) {
        updateGoal(data.goal.current, data.goal.target);

        if (data.goal.title) {
            document.getElementById("goalName").innerText = data.goal.title;
        }
    }
};

function updateGoal(current, target) {
    const percent = Math.min(100, (current / target) * 100);
    updateLiquid(percent);
    spawnHeart();
    if (percent >= 100) triggerFullGoal();
}

/* Заливка жидкости */
function updateLiquid(percent) {
    const liquid = document.getElementById("liquid");
    const maxHeight = 160;
    const newHeight = maxHeight * (percent / 100);
    const newY = 230 - newHeight;

    liquid.setAttribute("y", newY);
    liquid.setAttribute("height", newHeight);
}

/* Плавающее сердечко */
function spawnHeart() {
    const container = document.getElementById("heartContainer");
    const h = document.createElement("div");
    h.classList.add("floatHeart");
    h.innerText = "❤";
    h.style.left = (80 + Math.random() * 60) + "px";
    h.style.bottom = "40px";
    container.appendChild(h);
    setTimeout(() => h.remove(), 2200);
}

/* Конфетти при 100% */
function spawnConfetti() {
    const container = document.getElementById("heartContainer");
    for (let i = 0; i < 20; i++) {
        const c = document.createElement("div");
        c.classList.add("confetti");
        c.style.left = (60 + Math.random() * 80) + "px";
        c.style.bottom = "40px";
        c.style.background = ["#ff7abf", "#ff4fa3", "#a8ffd4"][Math.floor(Math.random()*3)];
        c.style.animationDuration = (0.8 + Math.random()*0.6) + "s";
        container.appendChild(c);
        setTimeout(() => c.remove(), 1200);
    }
}

/* Эффект при достижении цели */
function triggerFullGoal() {
    const svg = document.getElementById("heartSVG");
    svg.classList.add("glow", "shake");
    spawnConfetti();

    setTimeout(() => {
        svg.classList.remove("shake");
    }, 5000);
}
</script>

</body>
</html>
